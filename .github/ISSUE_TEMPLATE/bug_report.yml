name: "Bug Report"
description: Report a bug or regression
labels: ["bug", "release:patch", "type:bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: Describe the issue clearly.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      placeholder: |
        1. Go to...
        2. Tap...
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: What must be true for this issue to be complete?
    validations:
      required: true
  - type: dropdown
    id: impact
    attributes:
      label: Release Impact
      options:
        - patch
        - minor
        - major
      default: 0
    validations:
      required: true
