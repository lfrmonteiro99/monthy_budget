name: Flutter CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'monthy_budget_flutter/**'
      - '.github/workflows/flutter-ci.yml'
  push:
    branches: [main]
    tags:
      - 'v*'
    paths:
      - 'monthy_budget_flutter/**'
      - '.github/workflows/flutter-ci.yml'

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: monthy_budget_flutter

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: stable
          cache: true

      - name: Create Supabase config stub
        run: |
          mkdir -p lib/config
          cat > lib/config/supabase_config.dart << 'DART'
          const supabaseUrl = 'https://placeholder.supabase.co';
          const supabaseAnonKey = 'placeholder';
          DART

      - name: Install dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test

  build:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: monthy_budget_flutter

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: stable
          cache: true

      - name: Validate Supabase secrets
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::error::SUPABASE_URL and SUPABASE_ANON_KEY secrets must be set for release builds"
            exit 1
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Install dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/keystore.jks

      - name: Build APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          flutter build apk --release \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      - name: Build AAB
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          flutter build appbundle --release \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gestao-mensal-apk
          path: monthy_budget_flutter/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: gestao-mensal-aab
          path: monthy_budget_flutter/build/app/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Build release notes from CHANGELOG
        if: startsWith(github.ref, 'refs/tags/v')
        id: notes
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          BODY_FILE="release_notes.md"
          awk -v tag="$TAG" '
            BEGIN { capture=0 }
            $0 ~ "^## "tag"( |$)" { capture=1; print; next }
            /^## / && capture==1 { exit }
            capture==1 { print }
          ' CHANGELOG.md > "$BODY_FILE"

          if [ -s "$BODY_FILE" ]; then
            echo "has_notes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_notes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release from CHANGELOG
        if: startsWith(github.ref, 'refs/tags/v') && steps.notes.outputs.has_notes == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            monthy_budget_flutter/build/app/outputs/flutter-apk/app-release.apk
            monthy_budget_flutter/build/app/outputs/bundle/release/*.aab
          body_path: monthy_budget_flutter/release_notes.md

      - name: Create GitHub Release (fallback autogenerated)
        if: startsWith(github.ref, 'refs/tags/v') && steps.notes.outputs.has_notes != 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            monthy_budget_flutter/build/app/outputs/flutter-apk/app-release.apk
            monthy_budget_flutter/build/app/outputs/bundle/release/*.aab
          generate_release_notes: true

      - name: Create prerelease
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-${{ github.sha }}
          name: Dev build (${{ github.sha }})
          files: |
            monthy_budget_flutter/build/app/outputs/flutter-apk/app-release.apk
            monthy_budget_flutter/build/app/outputs/bundle/release/*.aab
          prerelease: true
          make_latest: false
