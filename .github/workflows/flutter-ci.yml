name: Flutter CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'monthy_budget_flutter/**'
      - '.github/workflows/flutter-ci.yml'
  push:
    branches: [main]
    # Note: v* tag builds are handled by release-tag.yml (which also creates
    # the tag). Tags pushed with GITHUB_TOKEN don't trigger other workflows
    # (GitHub anti-recursion), so building on tag push here would never fire.
    paths:
      - 'monthy_budget_flutter/**'
      - '.github/workflows/flutter-ci.yml'

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: monthy_budget_flutter

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: stable
          cache: true

      - name: Create Supabase config stub
        run: |
          mkdir -p lib/config
          cat > lib/config/supabase_config.dart << 'DART'
          const supabaseUrl = 'https://placeholder.supabase.co';
          const supabaseAnonKey = 'placeholder';
          DART

      - name: Install dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests
        run: flutter test

  # Dev builds: every push to main creates a prerelease with APK/AAB.
  # Formal release builds (v* tags) are handled by release-tag.yml.
  build:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: monthy_budget_flutter

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: stable
          cache: true

      - name: Validate Supabase secrets
        run: |
          if [ -z "${SUPABASE_URL}" ]; then
            echo "::error::SUPABASE_URL secret is not set. Go to repo Settings > Secrets and variables > Actions and add it."
            exit 1
          fi
          if [ -z "${SUPABASE_ANON_KEY}" ]; then
            echo "::error::SUPABASE_ANON_KEY secret is not set. Go to repo Settings > Secrets and variables > Actions and add it."
            exit 1
          fi
          echo "Supabase URL: ${SUPABASE_URL:0:30}... (truncated)"
          echo "Anon key length: ${#SUPABASE_ANON_KEY} chars"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Install dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Validate signing secrets
        run: |
          missing=""
          [ -z "${KEYSTORE_BASE64}" ] && missing="${missing} KEYSTORE_BASE64"
          [ -z "${KEYSTORE_PASSWORD}" ] && missing="${missing} KEYSTORE_PASSWORD"
          [ -z "${KEY_ALIAS}" ] && missing="${missing} KEY_ALIAS"
          [ -z "${KEY_PASSWORD}" ] && missing="${missing} KEY_PASSWORD"
          if [ -n "$missing" ]; then
            echo "::error::Missing signing secrets:${missing}. Go to repo Settings > Secrets and variables > Actions and add them."
            exit 1
          fi
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/keystore.jks
          if [ ! -s android/keystore.jks ]; then
            echo "::error::Decoded keystore is empty - KEYSTORE_BASE64 secret may be invalid."
            exit 1
          fi
          echo "Keystore decoded: $(wc -c < android/keystore.jks) bytes"

      - name: Build APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          flutter build apk --release \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      - name: Build AAB
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          flutter build appbundle --release \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gestao-mensal-apk
          path: monthy_budget_flutter/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: gestao-mensal-aab
          path: monthy_budget_flutter/build/app/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Create prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-${{ github.sha }}
          name: Dev build (${{ github.sha }})
          files: |
            monthy_budget_flutter/build/app/outputs/flutter-apk/app-release.apk
            monthy_budget_flutter/build/app/outputs/bundle/release/*.aab
          prerelease: true
          make_latest: false

  # iOS compilation check: runs on push to main only (macOS runners are expensive).
  # No code signing — just verifies the project compiles for iOS.
  build-ios:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: macos-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: monthy_budget_flutter

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: stable
          cache: true

      - name: Validate Supabase secrets
        run: |
          if [ -z "${SUPABASE_URL}" ]; then
            echo "::error::SUPABASE_URL secret is not set. Go to repo Settings > Secrets and variables > Actions and add it."
            exit 1
          fi
          if [ -z "${SUPABASE_ANON_KEY}" ]; then
            echo "::error::SUPABASE_ANON_KEY secret is not set. Go to repo Settings > Secrets and variables > Actions and add it."
            exit 1
          fi
          echo "Supabase URL: ${SUPABASE_URL:0:30}... (truncated)"
          echo "Anon key length: ${#SUPABASE_ANON_KEY} chars"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Install dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Build iOS (no codesign)
        run: |
          flutter build ios --no-codesign --release \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
