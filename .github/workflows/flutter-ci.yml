name: Flutter CI

on:
  push:
    paths:
      - 'monthy_budget_flutter/**'
      - '.github/workflows/flutter-ci.yml'

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: monthy_budget_flutter

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: stable
          cache: true

      - name: Create Supabase config stub
        run: |
          mkdir -p lib/config
          cat > lib/config/supabase_config.dart << 'DART'
          const supabaseUrl = 'https://placeholder.supabase.co';
          const supabaseAnonKey = 'placeholder';
          DART

      - name: Install dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test

  auto-pr:
    needs: test
    if: github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create PR if none exists
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list --head "$GITHUB_REF_NAME" --base main --json number --jq '.[0].number')

          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists"
            echo "pr_number=$EXISTING" >> "$GITHUB_OUTPUT"

            # Update PR body with issue references from new commits
            ISSUES=$(git log origin/main..HEAD --format="%s %b" \
              | grep -oiE '(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+#[0-9]+' \
              | grep -oE '#[0-9]+' | sort -u | tr '\n' ' ')
            if [ -n "$ISSUES" ]; then
              CURRENT_BODY=$(gh pr view "$EXISTING" --json body --jq '.body')
              # Only update if the issues aren't already in the body
              MISSING=""
              for issue in $ISSUES; do
                if ! echo "$CURRENT_BODY" | grep -qF "$issue"; then
                  MISSING="$MISSING $issue"
                fi
              done
              if [ -n "$MISSING" ]; then
                NEW_BODY="$CURRENT_BODY

Closes$MISSING"
                gh pr edit "$EXISTING" --body "$NEW_BODY"
                echo "Updated PR body with issue references:$MISSING"
              fi
            fi
          else
            # Extract issue references from all commits on this branch
            ISSUES=$(git log origin/main..HEAD --format="%s %b" \
              | grep -oiE '(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+#[0-9]+' \
              | grep -oE '#[0-9]+' | sort -u | tr '\n' ' ')

            BODY="Auto-created PR from push to \`$GITHUB_REF_NAME\`."
            if [ -n "$ISSUES" ]; then
              BODY="$BODY

Closes $ISSUES"
            fi

            PR_URL=$(gh pr create \
              --base main \
              --head "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --body "$BODY")
            PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
            echo "Created PR #$PR_NUMBER"
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          fi

      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ steps.pr.outputs.pr_number }} --auto --squash

  build:
    needs: test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: monthy_budget_flutter

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: stable
          cache: true

      - name: Create Supabase config
        run: |
          mkdir -p lib/config
          cat > lib/config/supabase_config.dart << DART
          const supabaseUrl = '${SUPABASE_URL}';
          const supabaseAnonKey = '${SUPABASE_ANON_KEY}';
          DART
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://placeholder.supabase.co' }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'placeholder' }}

      - name: Install dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/keystore.jks

      - name: Build APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: flutter build apk --release

      - name: Build AAB
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: flutter build appbundle --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gestao-mensal-apk
          path: monthy_budget_flutter/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: gestao-mensal-aab
          path: monthy_budget_flutter/build/app/outputs/bundle/release/*.aab
          retention-days: 30

      # Tagged releases -> formal GitHub Release
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            monthy_budget_flutter/build/app/outputs/flutter-apk/app-release.apk
            monthy_budget_flutter/build/app/outputs/bundle/release/*.aab
          generate_release_notes: true

      # Push to main -> prerelease with commit SHA
      - name: Create prerelease
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-${{ github.sha }}
          name: Dev build (${{ github.sha }})
          files: |
            monthy_budget_flutter/build/app/outputs/flutter-apk/app-release.apk
            monthy_budget_flutter/build/app/outputs/bundle/release/*.aab
          prerelease: true
          make_latest: false
