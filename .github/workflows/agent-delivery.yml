name: Agent Delivery

on:
  push:
    branches-ignore:
      - main
    tags-ignore:
      - 'v*'

permissions:
  actions: write
  contents: write
  pull-requests: write
  issues: write
  statuses: write

concurrency:
  group: agent-delivery-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    env:
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
    outputs:
      issue_number: ${{ steps.meta.outputs.issue_number }}
      release_label: ${{ steps.meta.outputs.release_label }}
      release_notes: ${{ steps.meta.outputs.release_notes }}
      branch_name: ${{ steps.meta.outputs.branch_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive issue, release label, and notes
        id: meta
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_REF_NAME}"
          echo "branch_name=$BRANCH" >> "$GITHUB_OUTPUT"

          git fetch origin "$DEFAULT_BRANCH" --depth=1 || true

          COMMITS_RANGE="origin/$DEFAULT_BRANCH..HEAD"
          if ! git rev-parse "origin/$DEFAULT_BRANCH" >/dev/null 2>&1; then
            COMMITS_RANGE="HEAD~20..HEAD"
          fi

          COMMIT_TEXT="$(git log $COMMITS_RANGE --pretty=format:'%s%n%b' || true)"
          if [[ -z "${COMMIT_TEXT// }" ]]; then
            COMMIT_TEXT="$(git log -n 20 --pretty=format:'%s%n%b' || true)"
          fi

          # Priority: branch name first (reliable), then commit messages (fragile)
          ISSUE=""
          ISSUE="$(printf '%s\n' "$BRANCH" | grep -oP '(?<=issue-)\d+' | head -n1 || true)"
          if [[ -z "$ISSUE" ]]; then
            ISSUE="$(printf '%s\n' "$BRANCH" | grep -Eo '[0-9]+' | head -n1 || true)"
          fi
          if [[ -z "$ISSUE" ]]; then
            ISSUE="$(printf '%s\n' "$COMMIT_TEXT" | grep -Eo '#[0-9]+' | head -n1 | tr -d '#' || true)"
          fi

          if [[ -n "$ISSUE" ]]; then
            if ! gh issue view "$ISSUE" >/dev/null 2>&1; then
              ISSUE=""
            fi
          fi

          if [[ -z "$ISSUE" ]]; then
            TITLE="$(git log -1 --pretty=%s)"
            BODY_FILE="issue_body.md"
            {
              echo "Auto-created from branch: \`$BRANCH\`"
              echo
              echo "## Scope"
              echo "- Implement requested code changes from this branch."
              echo
              echo "## Acceptance Criteria"
              echo "- CI tests pass."
              echo "- PR includes release notes."
              echo "- Merge to main completes successfully."
              echo
              echo "## Related Commits"
              git log $COMMITS_RANGE --pretty='- %h %s' || true
            } > "$BODY_FILE"

            ISSUE_URL="$(gh issue create --title "$TITLE" --body-file "$BODY_FILE" --label chore)"
            ISSUE="$(printf '%s\n' "$ISSUE_URL" | sed -E 's#.*/issues/([0-9]+).*#\1#')"
          fi

          RELEASE_LABEL="release:patch"
          if printf '%s\n' "$COMMIT_TEXT" | grep -Eiq 'BREAKING CHANGE|^[a-zA-Z]+!:'; then
            RELEASE_LABEL="release:major"
          elif printf '%s\n' "$COMMIT_TEXT" | grep -Eiq '(^|\n)feat(\(|:)|feature'; then
            RELEASE_LABEL="release:minor"
          fi

          NOTES_FILE="release_notes.md"
          {
            echo "- Automated delivery for branch \`$BRANCH\`."
            git log $COMMITS_RANGE --pretty='- %s' || true
          } > "$NOTES_FILE"

          echo "issue_number=$ISSUE" >> "$GITHUB_OUTPUT"
          echo "release_label=$RELEASE_LABEL" >> "$GITHUB_OUTPUT"
          echo "release_notes<<EOF" >> "$GITHUB_OUTPUT"
          cat "$NOTES_FILE" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

  test:
    runs-on: ubuntu-latest
    needs: prepare
    defaults:
      run:
        working-directory: monthy_budget_flutter
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: stable
          cache: true
      - name: Create Supabase config stub
        run: |
          mkdir -p lib/config
          cat > lib/config/supabase_config.dart << 'DART'
          const supabaseUrl = 'https://placeholder.supabase.co';
          const supabaseAnonKey = 'placeholder';
          DART
      - name: Install dependencies
        run: flutter pub get
      - name: Generate l10n
        run: flutter gen-l10n
      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
      - name: Test
        run: flutter test

  open-pr-and-merge:
    runs-on: ubuntu-latest
    needs: [prepare, test]
    outputs:
      release_tag: ${{ steps.release-tag.outputs.tag }}
    env:
      GH_TOKEN: ${{ github.token }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      RELEASE_NOTES: ${{ needs.prepare.outputs.release_notes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create or update PR and merge
        shell: bash
        run: |
          set -euo pipefail
          BRANCH='${{ needs.prepare.outputs.branch_name }}'
          ISSUE='${{ needs.prepare.outputs.issue_number }}'
          LABEL='${{ needs.prepare.outputs.release_label }}'

          git fetch origin "$DEFAULT_BRANCH" --depth=1 || true

          BODY_FILE="pr_body.md"
          {
            echo "## Summary"
            echo "Automated delivery from branch \`$BRANCH\`."
            echo
            echo "## Linked Issue"
            echo "Fixes #$ISSUE"
            echo
            echo "## Release Notes"
            printf "%s\n" "$RELEASE_NOTES"
          } > "$BODY_FILE"

          PR_NUMBER="$(gh pr list --head "$BRANCH" --base "$DEFAULT_BRANCH" --json number --jq '.[0].number // empty')"

          if [[ -z "$PR_NUMBER" ]]; then
            TITLE="$(git log -1 --pretty=%s)"
            gh pr create \
              --base "$DEFAULT_BRANCH" \
              --head "$BRANCH" \
              --title "$TITLE" \
              --body-file "$BODY_FILE"
            PR_NUMBER="$(gh pr list --head "$BRANCH" --base "$DEFAULT_BRANCH" --json number --jq '.[0].number')"
          else
            gh pr edit "$PR_NUMBER" --body-file "$BODY_FILE"
          fi

          PR_STATE="$(gh pr view "$PR_NUMBER" --json state --jq .state)"
          if [[ "$PR_STATE" != "OPEN" ]]; then
            echo "PR #$PR_NUMBER is $PR_STATE; skipping merge."
            exit 0
          fi

          gh pr edit "$PR_NUMBER" --add-label "$LABEL" || true

          # --- Inline PR validation (replaces external PR Governance trigger) ---
          # The PR Governance workflow cannot be triggered reliably from here because
          # GITHUB_TOKEN-created PRs don't fire pull_request events (GitHub anti-recursion),
          # and workflow_dispatch checks don't associate with the PR.
          # Instead, run the same validation inline and post a commit status.
          SHA="$(gh pr view "$PR_NUMBER" --json headRefOid --jq .headRefOid)"
          PR_BODY="$(gh pr view "$PR_NUMBER" --json body --jq .body)"
          PR_LABELS="$(gh pr view "$PR_NUMBER" --json labels --jq '.labels[].name' | paste -sd, -)"

          VALIDATE_OK=true
          VALIDATE_MSG=""

          if ! echo "$PR_BODY" | grep -Eiq '(Fixes|Closes|Resolves)[[:space:]]+#[0-9]+'; then
            VALIDATE_OK=false
            VALIDATE_MSG="PR body must include: Fixes #<issue-number>"
          fi

          if ! echo "$PR_BODY" | grep -Eiq '^##[[:space:]]+Release Notes'; then
            VALIDATE_OK=false
            VALIDATE_MSG="${VALIDATE_MSG:+$VALIDATE_MSG; }PR body must include a '## Release Notes' section"
          fi

          if ! echo "$PR_LABELS" | grep -Eq '(^|,)(release:patch|release:minor|release:major)(,|$)'; then
            VALIDATE_OK=false
            VALIDATE_MSG="${VALIDATE_MSG:+$VALIDATE_MSG; }PR must include one release label: release:patch | release:minor | release:major"
          fi

          if [[ "$VALIDATE_OK" == "true" ]]; then
            gh api "repos/${{ github.repository }}/statuses/$SHA" \
              -f state=success \
              -f context=validate-pr \
              -f description="PR governance checks passed" \
              -f target_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "✅ validate-pr: passed"
          else
            gh api "repos/${{ github.repository }}/statuses/$SHA" \
              -f state=failure \
              -f context=validate-pr \
              -f description="$VALIDATE_MSG" \
              -f target_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "❌ validate-pr: $VALIDATE_MSG"
            exit 1
          fi

          # Resolve all bot review threads to unblock required_conversation_resolution
          UNRESOLVED="$(gh api graphql -f query='
            query($owner:String!,$repo:String!,$pr:Int!) {
              repository(owner:$owner,name:$repo) {
                pullRequest(number:$pr) {
                  reviewThreads(first:50) {
                    nodes { id isResolved comments(first:1) { nodes { author { login } } } }
                  }
                }
              }
            }' -f owner="${{ github.repository_owner }}" \
               -f repo="$(echo '${{ github.repository }}' | cut -d/ -f2)" \
               -F pr="$PR_NUMBER" \
               --jq '.data.repository.pullRequest.reviewThreads.nodes[] | select(.isResolved==false) | select(.comments.nodes[0].author.login | test("\\[bot\\]$|bot$")) | .id')"

          for THREAD_ID in $UNRESOLVED; do
            gh api graphql -f query="mutation { resolveReviewThread(input:{threadId:\"$THREAD_ID\"}) { thread { isResolved } } }" --silent
            echo "Resolved bot review thread: $THREAD_ID"
          done

          TITLE="$(gh pr view "$PR_NUMBER" --json title --jq .title)"
          gh pr merge "$PR_NUMBER" --auto --squash --delete-branch \
            --subject "$TITLE (Fixes #$ISSUE)" \
            --body "Fixes #$ISSUE"

      - name: Create release tag and GitHub Release
        id: release-tag
        shell: bash
        run: |
          set -euo pipefail
          BRANCH='${{ needs.prepare.outputs.branch_name }}'

          # Detect release version from branch name or commit messages
          TAG=""

          # Try branch name first (release/vYYYY.M.PATCH)
          TAG="$(echo "$BRANCH" | grep -oP 'v\d+\.\d+\.\d+' || true)"

          # Fallback: search recent commits for chore(release): vX.Y.Z
          if [[ -z "$TAG" ]]; then
            git fetch origin "$DEFAULT_BRANCH" --depth=1 || true
            TAG="$(git log "origin/$DEFAULT_BRANCH..HEAD" --pretty=%s 2>/dev/null \
              | grep -oP 'v\d+\.\d+\.\d+' | head -n1 || true)"
          fi

          # Last resort: search last 10 commits
          if [[ -z "$TAG" ]]; then
            TAG="$(git log -10 --pretty=%s \
              | grep -P 'chore\(release\)' \
              | grep -oP 'v\d+\.\d+\.\d+' | head -n1 || true)"
          fi

          if [[ -z "$TAG" ]]; then
            echo "No version tag found in branch name or commits, skipping."
            exit 0
          fi

          echo "Detected release tag: $TAG"

          echo "Waiting for PR merge to complete..."
          PR_NUMBER="$(gh pr list --head "$BRANCH" --base "$DEFAULT_BRANCH" --state all --json number --jq '.[0].number // empty')"
          if [[ -z "$PR_NUMBER" ]]; then
            echo "No PR found for $BRANCH"; exit 0
          fi

          for i in $(seq 1 30); do
            STATE="$(gh pr view "$PR_NUMBER" --json state --jq .state)"
            if [[ "$STATE" == "MERGED" ]]; then break; fi
            echo "PR #$PR_NUMBER state: $STATE (attempt $i/30)"
            sleep 10
          done

          if [[ "$STATE" != "MERGED" ]]; then
            echo "PR #$PR_NUMBER did not merge in time, skipping tag."
            exit 0
          fi

          MERGE_SHA="$(gh pr view "$PR_NUMBER" --json mergeCommit --jq .mergeCommit.oid)"
          if [[ -z "$MERGE_SHA" ]]; then
            echo "Could not get merge commit SHA"; exit 1
          fi

          # Check tag doesn't already exist
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q .; then
            echo "Tag $TAG already exists, skipping."
            exit 0
          fi

          # Create tag on merge commit
          git tag "$TAG" "$MERGE_SHA"
          git push origin "$TAG"

          # Extract changelog section
          CHANGELOG="monthy_budget_flutter/CHANGELOG.md"
          VERSION="${TAG#v}"
          BODY="Release $TAG"
          if [[ -f "$CHANGELOG" ]]; then
            SECTION="$(awk -v ver="$VERSION" '
              /^## / { if (found) exit; if (index($0, ver)) found=1; next }
              found { print }
            ' "$CHANGELOG")"
            if [[ -n "$SECTION" ]]; then BODY="$SECTION"; fi
          fi

          gh release create "$TAG" \
            --target "$MERGE_SHA" \
            --title "$TAG" \
            --notes "$BODY"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "✅ Created tag $TAG and GitHub Release"

  build-release:
    needs: [prepare, open-pr-and-merge]
    if: needs.open-pr-and-merge.outputs.release_tag != ''
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: monthy_budget_flutter
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Validate signing secrets
        run: |
          missing=""
          [ -z "${KEYSTORE_BASE64}" ] && missing="${missing} KEYSTORE_BASE64"
          [ -z "${KEYSTORE_PASSWORD}" ] && missing="${missing} KEYSTORE_PASSWORD"
          [ -z "${KEY_ALIAS}" ] && missing="${missing} KEY_ALIAS"
          [ -z "${KEY_PASSWORD}" ] && missing="${missing} KEY_PASSWORD"
          if [ -n "$missing" ]; then
            echo "::error::Missing signing secrets:${missing}. Go to repo Settings > Secrets and variables > Actions and add them."
            exit 1
          fi
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Validate monetization secrets
        run: |
          missing=""
          [ -z "${REVENUECAT_API_KEY}" ] && missing="${missing} REVENUECAT_API_KEY"
          [ -z "${ADMOB_APP_ID}" ] && missing="${missing} ADMOB_APP_ID"
          [ -z "${ADMOB_BANNER_AD_UNIT_ID}" ] && missing="${missing} ADMOB_BANNER_AD_UNIT_ID"
          if [ -n "$missing" ]; then
            echo "::error::Missing monetization secrets:${missing}. Android release builds require these --dart-define values."
            exit 1
          fi
        env:
          REVENUECAT_API_KEY: ${{ secrets.REVENUECAT_API_KEY }}
          ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}
          ADMOB_BANNER_AD_UNIT_ID: ${{ secrets.ADMOB_BANNER_AD_UNIT_ID }}

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/keystore.jks
          if [ ! -s android/keystore.jks ]; then
            echo "::error::Decoded keystore is empty - KEYSTORE_BASE64 secret may be invalid."
            exit 1
          fi
          echo "Keystore decoded: $(wc -c < android/keystore.jks) bytes"

      - name: Build APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          flutter build apk --release \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=REVENUECAT_API_KEY=${{ secrets.REVENUECAT_API_KEY }} \
            --dart-define=ADMOB_APP_ID=${{ secrets.ADMOB_APP_ID }} \
            --dart-define=ADMOB_BANNER_AD_UNIT_ID=${{ secrets.ADMOB_BANNER_AD_UNIT_ID }}

      - name: Build AAB
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          flutter build appbundle --release \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=REVENUECAT_API_KEY=${{ secrets.REVENUECAT_API_KEY }} \
            --dart-define=ADMOB_APP_ID=${{ secrets.ADMOB_APP_ID }} \
            --dart-define=ADMOB_BANNER_AD_UNIT_ID=${{ secrets.ADMOB_BANNER_AD_UNIT_ID }}

      - name: Upload artifacts to GitHub Release
        run: |
          TAG="${{ needs.open-pr-and-merge.outputs.release_tag }}"
          APK="build/app/outputs/flutter-apk/app-release.apk"
          AAB="$(ls build/app/outputs/bundle/release/*.aab 2>/dev/null | head -n1)"

          if [ -f "$APK" ]; then
            gh release upload "$TAG" "$APK" --clobber
            echo "✅ Uploaded APK to release $TAG"
          else
            echo "::warning::APK not found at $APK"
          fi

          if [ -n "$AAB" ] && [ -f "$AAB" ]; then
            gh release upload "$TAG" "$AAB" --clobber
            echo "✅ Uploaded AAB to release $TAG"
          else
            echo "::warning::AAB not found"
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gestao-mensal-apk
          path: monthy_budget_flutter/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: gestao-mensal-aab
          path: monthy_budget_flutter/build/app/outputs/bundle/release/*.aab
          retention-days: 30
