name: Auto PR & Merge

on:
  push:
    branches-ignore:
      - main
    paths:
      - 'monthy_budget_flutter/**'
      - '.github/workflows/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create PR if none exists
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if a PR already exists for this branch
          EXISTING=$(gh pr list --head "$GITHUB_REF_NAME" --base main --json number --jq '.[0].number')

          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists"
            echo "pr_number=$EXISTING" >> "$GITHUB_OUTPUT"
          else
            # Create PR with branch name as title
            PR_URL=$(gh pr create \
              --base main \
              --head "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --body "Auto-created PR from push to \`$GITHUB_REF_NAME\`.")
            PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
            echo "Created PR #$PR_NUMBER"
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          fi

      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ steps.pr.outputs.pr_number }} --auto --squash
