name: Close linked issues on PR merge

on:
  pull_request:
    types: [closed]

permissions:
  issues: write

jobs:
  close-issues:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Close linked issues
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = `${pr.title}\n${pr.body || ''}`;

            // Match "Closes #N", "Fixes #N", "Resolves #N" (case-insensitive)
            const pattern = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi;
            const issueNumbers = new Set();
            let match;
            while ((match = pattern.exec(body)) !== null) {
              issueNumbers.add(parseInt(match[1], 10));
            }

            if (issueNumbers.size === 0) {
              console.log('No linked issues found in PR title or body.');
              return;
            }

            for (const issueNumber of issueNumbers) {
              console.log(`Closing issue #${issueNumber}...`);
              try {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  state: 'closed',
                  state_reason: 'completed',
                });
                // Add a comment linking back to the PR
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  body: `Closed by #${pr.number}.`,
                });
                console.log(`Issue #${issueNumber} closed.`);
              } catch (err) {
                console.log(`Failed to close issue #${issueNumber}: ${err.message}`);
              }
            }
