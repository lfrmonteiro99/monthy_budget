name: Scrape Grocery Prices

on:
  schedule:
    - cron: '0 6 * * *'
  push:
    branches: [main]
    paths:
      - 'scrapers/**'
      - '.github/workflows/scrape-grocery-prices.yml'
      - '.github/workflows/grocery-scrape-reusable.yml'
      - 'monthy_budget_flutter/assets/grocery_prices.json'
      - 'monthy_budget_flutter/assets/grocery/**'
  workflow_dispatch:
    inputs:
      include_es_preview:
        description: 'Run Spain preview stores in addition to PT'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape_store_pt:
    strategy:
      fail-fast: false
      matrix:
        include:
          - country: PT
            store: continente
          - country: PT
            store: pingo_doce
          - country: PT
            store: auchan
    uses: ./.github/workflows/grocery-scrape-reusable.yml
    with:
      country: ${{ matrix.country }}
      store: ${{ matrix.store }}
      run_id: ${{ github.run_id }}-${{ github.run_attempt }}

  scrape_store_es_preview:
    if: github.event_name == 'workflow_dispatch' && inputs.include_es_preview == true
    strategy:
      fail-fast: false
      matrix:
        include:
          - country: ES
            store: mercadona
          - country: ES
            store: carrefour_es
    uses: ./.github/workflows/grocery-scrape-reusable.yml
    with:
      country: ${{ matrix.country }}
      store: ${{ matrix.store }}
      run_id: ${{ github.run_id }}-${{ github.run_attempt }}

  build_pt_bundle:
    name: Build PT grocery bundle
    runs-on: ubuntu-latest
    needs: [scrape_store_pt, scrape_store_es_preview]
    if: always()
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scrapers/requirements.txt

      - name: Install dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Download PT store artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: grocery-PT-*
          path: generated/grocery
          merge-multiple: true
          if-no-files-found: warn

      - name: Summarize PT store artifacts
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          expected = ["continente", "pingo_doce", "auchan"]
          root = Path("generated/grocery/PT")
          found = {}
          for store in expected:
            status_path = root / store / "status.json"
            if status_path.exists():
              payload = json.loads(status_path.read_text(encoding="utf-8"))
              summary = payload["store_summary"]
              found[store] = summary["status"]
            else:
              found[store] = "missing"

          lines = ["## PT grocery scrape matrix", "", "| Store | Status |", "| --- | --- |"]
          for store in expected:
            lines.append(f"| {store} | {found[store]} |")
          with open(Path("${{ github.step_summary }}"), "a", encoding="utf-8") as fh:
            fh.write("\n".join(lines) + "\n")
          PY

      - name: Build PT bundle and legacy asset
        run: |
          python -m scrapers.build_country_bundle \
            --country PT \
            --input-root generated/grocery \
            --output-root monthy_budget_flutter/assets/grocery \
            --legacy-output monthy_budget_flutter/assets/grocery_prices.json

      - name: Validate PT bundle
        run: |
          python -m scrapers.validate_bundle \
            --country PT \
            --input-root monthy_budget_flutter/assets/grocery | tee pt_validation.json

      - name: Upload PT bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: grocery-PT-bundle
          path: |
            monthy_budget_flutter/assets/grocery/PT/catalog.json
            monthy_budget_flutter/assets/grocery/PT/store_summaries.json
            monthy_budget_flutter/assets/grocery/PT/stores/*.json
            monthy_budget_flutter/assets/grocery_prices.json

  build_es_bundle:
    name: Build ES grocery bundle
    runs-on: ubuntu-latest
    needs: [scrape_store_pt, scrape_store_es_preview]
    if: github.event_name == 'workflow_dispatch' && inputs.include_es_preview == true && always()
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scrapers/requirements.txt

      - name: Install dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Download ES store artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: grocery-ES-*
          path: generated/grocery
          merge-multiple: true
          if-no-files-found: warn

      - name: Summarize ES store artifacts
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          expected = ["mercadona", "carrefour_es"]
          root = Path("generated/grocery/ES")
          found = {}
          for store in expected:
            status_path = root / store / "status.json"
            if status_path.exists():
              payload = json.loads(status_path.read_text(encoding="utf-8"))
              summary = payload["store_summary"]
              found[store] = summary["status"]
            else:
              found[store] = "missing"

          lines = ["## ES grocery preview matrix", "", "| Store | Status |", "| --- | --- |"]
          for store in expected:
            lines.append(f"| {store} | {found[store]} |")
          with open(Path("${{ github.step_summary }}"), "a", encoding="utf-8") as fh:
            fh.write("\n".join(lines) + "\n")
          PY

      - name: Build ES bundle
        run: |
          python -m scrapers.build_country_bundle \
            --country ES \
            --input-root generated/grocery \
            --output-root monthy_budget_flutter/assets/grocery

      - name: Validate ES bundle
        run: |
          python -m scrapers.validate_bundle \
            --country ES \
            --input-root monthy_budget_flutter/assets/grocery | tee es_validation.json

      - name: Upload ES bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: grocery-ES-bundle
          path: |
            monthy_budget_flutter/assets/grocery/ES/catalog.json
            monthy_budget_flutter/assets/grocery/ES/store_summaries.json
            monthy_budget_flutter/assets/grocery/ES/stores/*.json

  deploy_assets:
    name: Deploy grocery assets
    runs-on: ubuntu-latest
    needs: [build_pt_bundle, build_es_bundle]
    if: always()
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Download built grocery bundles
        uses: actions/download-artifact@v4
        with:
          pattern: grocery-*-bundle
          path: .
          merge-multiple: true
          if-no-files-found: warn

      - name: Explain publication strategy
        run: |
          {
            echo "## Publication strategy"
            echo
            echo "- Scheduled grocery scrapes do not push directly to \`main\`."
            echo "- PT runs on the daily scheduler."
            echo "- ES runs only via explicit preview dispatch."
            echo "- Fresh market data is published to \`gh-pages\`."
            echo "- Repository code/config changes still go through issue -> branch -> PR."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy assets to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./monthy_budget_flutter/assets
          keep_files: false
          commit_message: "chore: update grocery prices for GitHub Pages"
