name: Release Tag

# Triggers on push to main (works even when merge is done by GITHUB_TOKEN,
# unlike pull_request events which are suppressed for Actions-created merges).
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Check if release commit
        id: check
        shell: bash
        run: |
          MSG="${{ github.event.head_commit.message }}"
          if echo "$MSG" | grep -qP '^chore\(release\):.*v\d+\.\d+\.\d+'; then
            TAG="$(echo "$MSG" | grep -oP 'v\d+\.\d+\.\d+' | head -n1)"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "Detected release commit: $TAG"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
            echo "Not a release commit, skipping."
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.is_release == 'true'
        with:
          fetch-depth: 0

      - name: Verify tag does not exist
        if: steps.check.outputs.is_release == 'true'
        shell: bash
        run: |
          TAG="${{ steps.check.outputs.tag }}"
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping."
            echo "skip=true" >> "$GITHUB_ENV"
          fi

      - name: Extract changelog section
        if: steps.check.outputs.is_release == 'true' && env.skip != 'true'
        id: changelog
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.check.outputs.tag }}"
          VERSION="${TAG#v}"
          CHANGELOG="monthy_budget_flutter/CHANGELOG.md"

          if [[ ! -f "$CHANGELOG" ]]; then
            echo "body=Release $TAG" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BODY="$(awk -v ver="$VERSION" '
            /^## / {
              if (found) exit
              if (index($0, ver)) found=1
              next
            }
            found { print }
          ' "$CHANGELOG")"

          if [[ -z "$BODY" ]]; then
            BODY="Release $TAG"
          fi

          {
            echo "body<<CHANGELOG_EOF"
            echo "$BODY"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create tag and GitHub Release
        if: steps.check.outputs.is_release == 'true' && env.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.check.outputs.tag }}"
          SHA="${{ github.sha }}"

          git tag "$TAG" "$SHA"
          git push origin "$TAG"

          gh release create "$TAG" \
            --target "$SHA" \
            --title "$TAG" \
            --notes "${{ steps.changelog.outputs.body }}"

          echo "✅ Created tag $TAG and GitHub Release"
