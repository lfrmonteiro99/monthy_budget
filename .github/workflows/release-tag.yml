name: Release Tag

# Creates tag + release + builds APK/AAB when a release commit lands on main.
# Covers both human pushes and agent-delivery merges where the branch didn't
# start with 'release/' (so agent-delivery's build-release job was skipped).
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v2026.3.20)'
        required: true

permissions:
  contents: write

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    outputs:
      is_release: ${{ steps.check.outputs.is_release }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - name: Check if release commit
        id: check
        shell: bash
        run: |
          # Support workflow_dispatch with explicit tag input
          if [[ -n "${{ github.event.inputs.tag }}" ]]; then
            TAG="${{ github.event.inputs.tag }}"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch for tag: $TAG"
          else
            MSG="${{ github.event.head_commit.message }}"
            if echo "$MSG" | grep -qP '^chore\(release\):.*v\d+\.\d+\.\d+'; then
              TAG="$(echo "$MSG" | grep -oP 'v\d+\.\d+\.\d+' | head -n1)"
              echo "is_release=true" >> "$GITHUB_OUTPUT"
              echo "tag=$TAG" >> "$GITHUB_OUTPUT"
              echo "Detected release commit: $TAG"
            else
              echo "is_release=false" >> "$GITHUB_OUTPUT"
              echo "Not a release commit, skipping."
            fi
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.is_release == 'true'
        with:
          fetch-depth: 0

      - name: Verify tag does not exist
        if: steps.check.outputs.is_release == 'true'
        shell: bash
        run: |
          TAG="${{ steps.check.outputs.tag }}"
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping tag creation."
            echo "skip_tag=true" >> "$GITHUB_ENV"
          fi

      - name: Extract changelog section
        if: steps.check.outputs.is_release == 'true' && env.skip_tag != 'true'
        id: changelog
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.check.outputs.tag }}"
          VERSION="${TAG#v}"
          CHANGELOG="monthy_budget_flutter/CHANGELOG.md"

          if [[ ! -f "$CHANGELOG" ]]; then
            echo "body=Release $TAG" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BODY="$(awk -v ver="$VERSION" '
            /^## / {
              if (found) exit
              if (index($0, ver)) found=1
              next
            }
            found { print }
          ' "$CHANGELOG")"

          if [[ -z "$BODY" ]]; then
            BODY="Release $TAG"
          fi

          {
            echo "body<<CHANGELOG_EOF"
            echo "$BODY"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create tag and GitHub Release
        if: steps.check.outputs.is_release == 'true' && env.skip_tag != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.check.outputs.tag }}"
          SHA="${{ github.sha }}"

          git tag "$TAG" "$SHA"
          git push origin "$TAG"

          gh release create "$TAG" \
            --target "$SHA" \
            --title "$TAG" \
            --notes "${{ steps.changelog.outputs.body }}"

          echo "✅ Created tag $TAG and GitHub Release"

  build-release:
    needs: tag-and-release
    if: needs.tag-and-release.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: monthy_budget_flutter
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: stable
          cache: true

      - name: Create Supabase config stub
        run: |
          mkdir -p lib/config
          if [ ! -f lib/config/supabase_config.dart ]; then
            cat > lib/config/supabase_config.dart << 'DART'
            const supabaseUrl = 'https://placeholder.supabase.co';
            const supabaseAnonKey = 'placeholder';
          DART
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Validate signing secrets
        run: |
          missing=""
          [ -z "${KEYSTORE_BASE64}" ] && missing="${missing} KEYSTORE_BASE64"
          [ -z "${KEYSTORE_PASSWORD}" ] && missing="${missing} KEYSTORE_PASSWORD"
          [ -z "${KEY_ALIAS}" ] && missing="${missing} KEY_ALIAS"
          [ -z "${KEY_PASSWORD}" ] && missing="${missing} KEY_PASSWORD"
          if [ -n "$missing" ]; then
            echo "::error::Missing signing secrets:${missing}. Go to repo Settings > Secrets and variables > Actions and add them."
            exit 1
          fi
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Validate monetization secrets
        run: |
          missing=""
          [ -z "${REVENUECAT_API_KEY}" ] && missing="${missing} REVENUECAT_API_KEY"
          [ -z "${ADMOB_APP_ID}" ] && missing="${missing} ADMOB_APP_ID"
          [ -z "${ADMOB_BANNER_AD_UNIT_ID}" ] && missing="${missing} ADMOB_BANNER_AD_UNIT_ID"
          if [ -n "$missing" ]; then
            echo "::error::Missing monetization secrets:${missing}. Android release builds require these --dart-define values."
            exit 1
          fi
        env:
          REVENUECAT_API_KEY: ${{ secrets.REVENUECAT_API_KEY }}
          ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}
          ADMOB_BANNER_AD_UNIT_ID: ${{ secrets.ADMOB_BANNER_AD_UNIT_ID }}

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/keystore.jks
          if [ ! -s android/keystore.jks ]; then
            echo "::error::Decoded keystore is empty - KEYSTORE_BASE64 secret may be invalid."
            exit 1
          fi
          echo "Keystore decoded: $(wc -c < android/keystore.jks) bytes"

      - name: Build APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          flutter build apk --release \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=REVENUECAT_API_KEY=${{ secrets.REVENUECAT_API_KEY }} \
            --dart-define=ADMOB_APP_ID=${{ secrets.ADMOB_APP_ID }} \
            --dart-define=ADMOB_BANNER_AD_UNIT_ID=${{ secrets.ADMOB_BANNER_AD_UNIT_ID }}

      - name: Build AAB
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          flutter build appbundle --release \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=REVENUECAT_API_KEY=${{ secrets.REVENUECAT_API_KEY }} \
            --dart-define=ADMOB_APP_ID=${{ secrets.ADMOB_APP_ID }} \
            --dart-define=ADMOB_BANNER_AD_UNIT_ID=${{ secrets.ADMOB_BANNER_AD_UNIT_ID }}

      - name: Upload artifacts to GitHub Release
        run: |
          TAG="${{ needs.tag-and-release.outputs.tag }}"
          APK="build/app/outputs/flutter-apk/app-release.apk"
          AAB="$(ls build/app/outputs/bundle/release/*.aab 2>/dev/null | head -n1)"

          if [ -f "$APK" ]; then
            gh release upload "$TAG" "$APK" --clobber
            echo "✅ Uploaded APK to release $TAG"
          else
            echo "::warning::APK not found at $APK"
          fi

          if [ -n "$AAB" ] && [ -f "$AAB" ]; then
            gh release upload "$TAG" "$AAB" --clobber
            echo "✅ Uploaded AAB to release $TAG"
          else
            echo "::warning::AAB not found"
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gestao-mensal-apk
          path: monthy_budget_flutter/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: gestao-mensal-aab
          path: monthy_budget_flutter/build/app/outputs/bundle/release/*.aab
          retention-days: 30
