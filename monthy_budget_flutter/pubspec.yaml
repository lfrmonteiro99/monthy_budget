name: orcamento_mensal
description: "Calculadora de Orcamento Mensal - Portuguese monthly budget calculator with IRS tax tables"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.0
  http: ^1.2.0
  supabase_flutter: ^2.8.0
  fl_chart: ^0.70.2
  intl: ^0.20.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/grocery_prices.json
    - assets/meal_planner/ingredients.json
    - assets/meal_planner/recipes.json
